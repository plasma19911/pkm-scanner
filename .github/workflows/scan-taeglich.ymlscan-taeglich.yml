name: Täglicher Pokémon-Scan

on:
  schedule:
    # 05:30 UTC = 07:30 deutscher Sommerzeit, 06:30 im Winter.
    # GitHub startet geplante Läufe je nach Auslastung ein paar Minuten später.
    - cron: "30 5 * * *"
  # Zusätzlich jederzeit von Hand startbar: Reiter "Actions" -> diesen
  # Workflow wählen -> "Run workflow".
  workflow_dispatch:

# Der Workflow schreibt die neuen Daten zurück ins Repository.
permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repository holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pillow installieren (für die App-Icons)
        run: pip install --quiet pillow

      - name: Shops scannen und App veröffentlichen
        run: python scan.py --publish-dir docs

      # Lieber ein roter Lauf als eine App, die stumm ohne Daten dasteht.
      - name: Prüfen, ob die App-Daten wirklich da sind
        run: |
          if [ ! -s docs/data.json ]; then
            echo "::error::docs/data.json fehlt oder ist leer - der Scan hat nichts veroeffentlicht."
            exit 1
          fi
          echo "docs/data.json: $(du -h docs/data.json | cut -f1)"
          python - <<'PY'
          import json
          d = json.load(open("docs/data.json", encoding="utf-8"))
          alerts = sum(len(a["items"]) for a in d.get("alerts", []))
          print(f"Stand {d.get('scan_time')}: {len(d.get('offers', []))} Angebote, "
                f"{len(d.get('preorders', []))} Vorbestellungen, {alerts} Alarm-Treffer")
          PY

      - name: Ergebnis zurück ins Repository schreiben
        run: |
          git config user.name "pkm-scanner-bot"
          git config user.email "actions@github.com"
          # -f (force) fuer docs: der veroeffentlichte Ordner gehoert immer ins
          # Repository, auch wenn eine .gitignore-Regel zufaellig auf einen
          # Dateinamen darin passt.
          git add -A -f docs
          git add -A price_history.json offers_history.json http_cache.json \
                      alerts.json corrections.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen - nichts zu committen."
          else
            git commit -m "Scan vom $(date -u '+%d.%m.%Y %H:%M') UTC"
            git push
          fi

      - name: Zusammenfassung
        if: always()
        run: |
          {
            echo "### Ergebnis"
            if [ -s docs/data.json ]; then
              echo "Veroeffentlicht: docs/data.json ($(du -h docs/data.json | cut -f1))"
            else
              echo "Keine Daten veroeffentlicht."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
