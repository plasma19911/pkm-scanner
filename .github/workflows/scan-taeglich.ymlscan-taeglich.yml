name: Täglicher Pokémon-Scan

on:
  schedule:
    # Zwei Termine, beide bewusst auf krummen Minuten: zur vollen und halben
    # Stunde staut sich bei GitHub der halbe Planet, und geplante Laeufe
    # werden dann verzoegert oder ganz uebersprungen.
    #
    #   04:17 UTC = 06:17 deutscher Sommerzeit (05:17 im Winter)
    #   10:47 UTC = 12:47 deutscher Sommerzeit (11:47 im Winter)
    #
    # Der zweite Termin ist die Absicherung: faellt der Morgenlauf aus,
    # sind die Preise mittags trotzdem aktuell. Wer nur einmal taeglich
    # scannen will, loescht die zweite Zeile.
    - cron: "17 4 * * *"
    - cron: "47 10 * * *"
  # Jederzeit von Hand startbar: Reiter "Actions" -> diesen Workflow
  # waehlen -> "Run workflow".
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repository holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pillow installieren (für die App-Icons)
        run: pip install --quiet pillow

      - name: Shops scannen und App veröffentlichen
        run: python scan.py --publish-dir docs

      # Wichtig: nicht nur pruefen, OB die Datei da ist, sondern ob sie aus
      # DIESEM Lauf stammt. Sonst wirkt ein Lauf erfolgreich, der wegen
      # gesperrter Shops gar nichts veroeffentlicht hat - die alte Datei
      # liegt ja weiterhin im Ordner.
      - name: Prüfen, ob die Daten wirklich frisch sind
        run: |
          if [ ! -s docs/data.json ]; then
            echo "::error::docs/data.json fehlt oder ist leer."
            exit 1
          fi
          python - <<'PY'
          import datetime, json, sys

          d = json.load(open("docs/data.json", encoding="utf-8"))
          alters_h = None
          if d.get("generated_at"):
              erzeugt = datetime.datetime.fromisoformat(d["generated_at"])
              alters_h = (datetime.datetime.now() - erzeugt).total_seconds() / 3600

          produkte = d.get("product_count", 0)
          print(f"Stand {d.get('scan_time')}: {len(d.get('offers', []))} Angebote, "
                f"{len(d.get('preorders', []))} Vorbestellungen, {produkte} Produkte")

          if alters_h is None or alters_h > 2:
              print("::error::Die veroeffentlichten Daten stammen nicht aus diesem "
                    "Lauf. Vermutlich haben zu wenige Shops geantwortet, deshalb "
                    "wurde der alte Stand behalten.")
              sys.exit(1)
          PY

      - name: Ergebnis zurück ins Repository schreiben
        run: |
          git config user.name "pkm-scanner-bot"
          git config user.email "actions@github.com"
          # -f (force) fuer docs: der veroeffentlichte Ordner gehoert immer
          # ins Repository, auch wenn eine .gitignore-Regel zufaellig auf
          # einen Dateinamen darin passt.
          git add -A -f docs
          git add -A price_history.json offers_history.json http_cache.json \
                      alerts.json corrections.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen - nichts zu committen."
          else
            git commit -m "Scan vom $(date -u '+%d.%m.%Y %H:%M') UTC"
            # Falls du waehrend des Laufs etwas ueber die Weboberflaeche
            # geaendert hast: erst nachziehen, dann schieben. Sonst lehnt
            # GitHub den Push ab ("fetch first") und der Lauf bricht ab,
            # nachdem er die ganze Arbeit schon gemacht hat.
            git pull --rebase --autostash
            git push
          fi

      - name: Zusammenfassung
        if: always()
        run: |
          {
            echo "### Ergebnis"
            if [ -s docs/data.json ]; then
              python -c "import json;d=json.load(open('docs/data.json',encoding='utf-8'));print(f\"Stand: {d.get('scan_time')}\");print(f\"{len(d.get('offers',[]))} Angebote, {len(d.get('preorders',[]))} Vorbestellungen, {d.get('product_count',0)} Produkte\")"
            else
              echo "Keine Daten veroeffentlicht."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
